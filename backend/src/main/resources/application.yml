spring:
  application:
    name: game-qa-copilot
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spec2test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
