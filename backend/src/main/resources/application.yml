spring:
  application:
    name: game-qa-copilot
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spec2test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${AI_MODEL}

app:
  ai:
    model: ${AI_MODEL}
    prompt-version: v1.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
